<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave Rezaba | Portfolio</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --accent-red: #e11d48;
            --text-white: #ffffff;
            --card-glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Desktop Animated Background */
        .desktop-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #000 25%, #0f0f0f 100%);
        }

        .desktop-bg::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(225, 29, 72, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(225, 29, 72, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(-50%, -50%); }
            100% { transform: translate(0, 0); }
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px; }

        header { text-align: center; margin-bottom: 50px; }

        .profile-pic {
            width: 150px; height: 150px; border-radius: 10px;
            border: 3px solid var(--accent-red);
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 2px; }

        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--text-white);
            color: var(--text-white);
            padding: 10px 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        .card {
            background: var(--card-glass);
            padding: 40px;
            border-left: 4px solid var(--accent-red);
            backdrop-filter: blur(10px);
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .link-button {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid var(--accent-red);
            color: var(--text-white);
            text-decoration: none;
            margin-right: 10px;
        }

        .link-button:hover { background: var(--accent-red); }
    </style>
</head>
<body>

<div class="desktop-bg"></div>

<div class="container">
    <header>
        <img src="https://daverezaba123-qghmk.wordpress.com/wp-content/uploads/2025/10/image_editor_output_image-2114367514-17610313795633610151855319212430.jpg?w=585" class="profile-pic" alt="Dave Rezaba">
        <h1>DAVE REZABA</h1>
        <p style="color: var(--accent-red);">IT PROFESSIONAL</p>
    </header>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="openTab('about')">PROFILE</button>
        <button class="tab-btn" onclick="openTab('projects')">WORKS</button>
    </nav>

    <section id="about" class="content-section active">
        <div class="card">
            <h2>ABOUT ME</h2>
            <p>Motivated IT professional focused on Networking, Hardware, and Web Development. Passionate about creating efficient digital solutions.</p>
            <br>
            <a href="#" class="link-button">DOWNLOAD CV</a>
        </div>
    </section>

    <section id="projects" class="content-section">
        <div class="card">
            <h2>PROJECTS</h2>
            <p>Explore my recent work in UI/UX and Web Development.</p>
        </div>
    </section>
</div>

<script>
    function openTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
