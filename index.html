<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio website</title>

<style>
:root {
    --bg-main: #8b0000;
    --black: #000000;
    --white: #ffffff;
    --red-accent: #ff1a1a;
    --text-main: #ffffff;
    --text-muted: #dddddd;
    --card-bg: rgba(0, 0, 0, 0.75);
    --transition: all 0.4s ease;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
}

body {
    background: var(--bg-main);
    color: var(--text-main);
}

/* Animated Red Background */
.live-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: linear-gradient(120deg, #8b0000, #b30000, #ff1a1a, #8b0000);
    background-size: 300% 300%;
    animation: move 10s infinite;
}

@keyframes move {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* Header */
header {
    text-align: center;
    padding: 70px 20px 30px;
}

.profile-pic {
    width: 150px;
    border-radius: 50%;
    border: 4px solid white;
}

h1 { color: white; }
header p { color: var(--red-accent); }

/* Tabs */
.nav-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

.tab-btn {
    background: black;
    color: white;
    border: 1px solid #222;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
}

.tab-btn:hover, .tab-btn.active {
    background: var(--red-accent);
}

/* Sections */
.content-section { display: none; }
.content-section.active { display: block; }

/* Cards */
.card {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 15px;
    margin-bottom: 20px;
}

h2, h3 { color: var(--red-accent); }

.info-list li {
    border-bottom: 1px solid #333;
    padding: 10px 0;
}

/* Buttons */
.link-button {
    background: black;
    color: white;
    padding: 10px 20px;
    border: 2px solid red;
    text-decoration: none;
    border-radius: 8px;
}

.link-button:hover {
    background: red;
}

/* AI */
.ai-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
}

#ai-widget {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    background: black;
    color: white;
}

#ai-header {
    background: black;
    padding: 10px;
}

#ai-body {
    height: 200px;
    overflow: auto;
    padding: 10px;
}

#ai-input-area {
    display: flex;
}

#ai-input {
    flex: 1;
    background: black;
    color: white;
}

#ai-send {
    background: red;
    color: white;
}
</style>
</head>

<body>

<div class="live-bg"></div>

<div class="container">
<header>
<img src="https://daverezaba123-qghmk.wordpress.com/wp-content/uploads/2025/10/image_editor_output_image-2114367514-17610313795633610151855319212430.jpg?w=585" class="profile-pic">
<h1>DAVE REZABA</h1>
<p>IT Professional | 25 Years Old</p>
</header>

<nav class="nav-tabs">
<button class="tab-btn active" onclick="openTab('about')">Profile</button>
<button class="tab-btn" onclick="openTab('skills')">Skills</button>
<button class="tab-btn" onclick="openTab('certificates')">Certs</button>
<button class="tab-btn" onclick="openTab('projects')">Works</button>
</nav>

<section id="about" class="content-section active">
<div class="card">
<h2>Personal Profile</h2>
<p>Motivated and results-driven Information Technology student...</p>
</div>
</section>

<section id="skills" class="content-section">
<div class="card">
<h2>Technical Skills</h2>
</div>
</section>

<section id="certificates" class="content-section">
<div class="card">
<h2>Certifications</h2>
</div>
</section>

<section id="projects" class="content-section">
<div class="card">
<h2>Project Links</h2>
</div>
</section>

</div>

<div class="ai-toggle" onclick="toggleAI()">☁️</div>

<div id="ai-widget">
<div id="ai-header">Portfolio Assistant</div>
<div id="ai-body"></div>
<div id="ai-input-area">
<input type="text" id="ai-input">
<button id="ai-send" onclick="askAI()">Send</button>
</div>
</div>

<script>
function openTab(id){
document.querySelectorAll('.content-section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleAI(){
let w=document.getElementById('ai-widget');
w.style.display = w.style.display==='block'?'none':'block';
}

function askAI(){
let input=document.getElementById('ai-input');
let body=document.getElementById('ai-body');
body.innerHTML += "<p>"+input.value+"</p>";
input.value="";
}
</script>

</body>
</html>
